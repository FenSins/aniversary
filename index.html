<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Anniversary Gift Options</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Georgia, serif;
      background: linear-gradient(135deg, #fff0f5, #ffe4e9, #ffd6de);
      overflow: hidden;
      position: relative;
    }

    .container {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(10px);
      padding: 45px 35px;
      border-radius: 28px;
      width: 90%;
      max-width: 520px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      z-index: 2;
    }

    h1 {
      color: #8b1e3f;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #5a2a35;
      font-size: 1.1rem;
      margin-bottom: 35px;
      line-height: 1.6;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .gift-btn {
      display: block;
      text-decoration: none;
      background: #b9375d;
      color: white;
      padding: 18px;
      border-radius: 40px;
      font-size: 1.08rem;
      font-weight: bold;
      transition: 0.3s ease;
      box-shadow: 0 8px 18px rgba(185,55,93,0.3);
    }

    .gift-btn:hover {
      background: #922746;
      transform: translateY(-4px) scale(1.02);
    }

    .footer {
      margin-top: 30px;
      color: #6d3a47;
      font-size: 0.95rem;
    }

    .heart {
      position: absolute;
      color: rgba(255,255,255,0.5);
      animation: float 10s linear infinite;
      font-size: 24px;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) scale(0.5);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-120vh) scale(1.2);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <!-- Floating Hearts -->
  <div class="heart" style="left:10%; animation-delay:0s;">❤</div>
  <div class="heart" style="left:25%; animation-delay:2s;">❤</div>
  <div class="heart" style="left:45%; animation-delay:4s;">❤</div>
  <div class="heart" style="left:65%; animation-delay:1s;">❤</div>
  <div class="heart" style="left:85%; animation-delay:3s;">❤</div>

  <div class="container">
    <h1>Happy Anniversary ❤️</h1>

    <p class="subtitle">
      I wanted to make this a little more special.<br>
      Pick your favorite gift option below ✨
    </p>

    <div class="buttons">

      <a class="gift-btn"
         href="https://www.gucci.com/us/en/pr/women/handbags/mini-bags-for-women/ophidia-small-shoulder-bag-p-838463FAE0P9746"
         target="_blank">
         ✨ Gucci Shoulder Bag
      </a>

      <a class="gift-btn"
         href="https://oradina.com/products/regal-diamond-huggies"
         target="_blank">
         💎 Diamond Huggies
      </a>

      <a class="gift-btn"
         href="https://www.jamesavery.com/bracelets/connected-hearts-charm-bracelet/BR-684-721500.html?utm_content=brand&gclsrc=aw.ds&gad_source=1&gad_campaignid=21410462780&gclid=Cj0KCQjw2YDQBhD_ARIsAE1qeSeZxAC0kQC2eFXclqP-tQKnCkfqbogZya0eBp3U7icmwsA11RSJvaIaAg_QEALw_wcB"
         target="_blank">
         ❤️ Connected Hearts Bracelet
      </a>

    </div>

    <div class="footer">
      Made with love 💌
    </div>
  </div>

</body>
</html>
