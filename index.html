<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anniversary Gift Options</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      font-family:Georgia, serif;
      background:linear-gradient(135deg,#fff0f5,#ffe0ea,#ffd6df);
      overflow:hidden;
      position:relative;
    }

    .container{
      background:rgba(255,255,255,0.88);
      padding:45px 35px;
      border-radius:28px;
      width:90%;
      max-width:550px;
      text-align:center;
      box-shadow:0 15px 35px rgba(0,0,0,0.15);
      z-index:2;
    }

    h1{
      color:#8b1e3f;
      font-size:2.5rem;
      margin-bottom:12px;
    }

    .subtitle{
      color:#5a2a35;
      margin-bottom:30px;
      line-height:1.6;
      font-size:1.05rem;
    }

    .buttons{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .gift-btn{
      border:none;
      cursor:pointer;
      background:#b9375d;
      color:white;
      padding:18px;
      border-radius:40px;
      font-size:1.05rem;
      font-weight:bold;
      transition:0.3s ease;
      box-shadow:0 8px 18px rgba(185,55,93,0.3);
    }

    .gift-btn:hover{
      background:#922746;
      transform:translateY(-3px);
    }

    .heart{
      position:absolute;
      color:rgba(255,255,255,0.5);
      font-size:24px;
      animation:float 10s linear infinite;
    }

    @keyframes float{
      0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
      }

      10%{
        opacity:1;
      }

      100%{
        transform:translateY(-120vh) scale(1.2);
        opacity:0;
      }
    }

    .footer{
      margin-top:28px;
      color:#6d3a47;
      font-size:0.95rem;
    }
  </style>
</head>

<body>

  <!-- Floating Hearts -->
  <div class="heart" style="left:10%; animation-delay:0s;">❤</div>
  <div class="heart" style="left:25%; animation-delay:2s;">❤</div>
  <div class="heart" style="left:45%; animation-delay:4s;">❤</div>
  <div class="heart" style="left:65%; animation-delay:1s;">❤</div>
  <div class="heart" style="left:85%; animation-delay:3s;">❤</div>

  <div class="container">

    <h1>Happy Anniversary ❤️</h1>

    <p class="subtitle">
      I picked out a few things for you.<br>
      Look through them first, then pick your favorite at the end ✨
    </p>

    <div class="buttons">

      <button class="gift-btn"
        onclick="window.open('https://www.gucci.com/us/en/pr/women/handbags/mini-bags-for-women/ophidia-small-shoulder-bag-p-838463FAE0P9746','_blank')">
        ✨ View Gucci Shoulder Bag
      </button>

      <button class="gift-btn"
        onclick="window.open('https://oradina.com/products/regal-diamond-huggies','_blank')">
        💎 View Diamond Huggies
      </button>

      <button class="gift-btn"
        onclick="window.open('https://www.jamesavery.com/bracelets/connected-hearts-charm-bracelet/BR-684-721500.html','_blank')">
        ❤️ View Connected Hearts Bracelet
      </button>

    </div>

    <div style="margin-top:35px;">
      <button class="gift-btn"
        style="background:#8b1e3f;"
        onclick="window.location.href='choose.html'">
        💌 Pick My Favorite
      </button>
    </div>

    <div class="footer">
      Made with love 💌
    </div>

  </div>

</body>
</html>
